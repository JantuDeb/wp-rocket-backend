services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  backend:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      JOB_COMPLETE_AFTER_MS: 1000
      QUEUE_DRIVER: redis
      REDIS_URL: redis://redis:6379
      START_WORKERS: "true"
      CPCSS_ALLOW_PRIVATE_NETWORKS: "true"
      CPCSS_CHROMIUM_EXECUTABLE: /usr/bin/chromium
      RUCSS_ALLOW_PRIVATE_NETWORKS: "true"
      RUCSS_CHROMIUM_EXECUTABLE: /usr/bin/chromium
      PERFORMANCE_ALLOW_PRIVATE_NETWORKS: "true"
      PERFORMANCE_CHROMIUM_EXECUTABLE: /usr/bin/chromium
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8080:8080"
